<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}" th:with="title=${movie.title}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <a class="detail-back" th:href="@{/movies}">← Retour aux films</a>

    <section class="detail-hero">
        <span class="eyebrow">Fiche film</span>
        <h1 class="page-title" th:text="${movie.title}">Titre</h1>
        <div class="meta-row">
            <span class="chip" th:text="${movie.releaseYear}">2024</span>
            <span class="chip chip--muted" th:text="${movie.genre}">Genre</span>
            <span class="chip chip--muted"><span th:text="${movie.durationMinutes}">120</span> min</span>
            <span class="chip chip--muted" th:if="${movie.director != null}"
                  th:text="${movie.director.firstName + ' ' + movie.director.lastName}">Réalisateur</span>
        </div>
    </section>

    <div class="detail-grid">
        <article class="detail-block detail-block--wide">
            <h2>Synopsis</h2>
            <p class="prose" th:if="${movie.synopsis != null and !#strings.isEmpty(movie.synopsis)}" th:text="${movie.synopsis}">Synopsis</p>
            <p class="prose" th:unless="${movie.synopsis != null and !#strings.isEmpty(movie.synopsis)}">Aucun synopsis disponible.</p>
        </article>

        <article class="detail-block">
            <h2>Année</h2>
            <p th:text="${movie.releaseYear}">2024</p>
        </article>

        <article class="detail-block">
            <h2>Genre</h2>
            <p th:text="${movie.genre}">Genre</p>
        </article>

        <article class="detail-block">
            <h2>Durée</h2>
            <p><span th:text="${movie.durationMinutes}">120</span> minutes</p>
        </article>

        <article class="detail-block">
            <h2>Réalisateur</h2>
            <p th:if="${movie.director != null}"
               th:text="${movie.director.firstName + ' ' + movie.director.lastName}">Réalisateur</p>
            <p th:if="${movie.director == null}">—</p>
        </article>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
